# ─────────────────────────────────────────────────────────────────────────────
# niches/fashion.yaml — the CANONICAL niche definition (Fashion is the default on main)
#
# A "niche" is one human-editable file that fully describes what the pipeline
# scrapes and how it scores virality. `scripts/new-niche.sh <niche>` reads this
# file and writes it into each platform's ReelScraper/platforms/<p>/niche_config.json
# (swapping only the niche-specific values) + a starter pages.txt of seed handles.
#
# Copy this file to niches/<your-niche>.yaml and edit it to define a new niche.
# ─────────────────────────────────────────────────────────────────────────────

# Display name for the niche. Written verbatim into every niche_config.json "niche"
# field and used to title discovery outputs.
niche: Fashion

# Per-platform configuration. The three platforms are fixed (instagram / x / youtube);
# each block tunes the same knobs for that platform's audience + virality dynamics.
platforms:

  instagram:
    # Max reels pulled per creator (maps to niche_config "reels_per_creator").
    reels_per_creator: 100

    # Discovery is Instagram-only and OFF by default. `keywords` drive AutoSearch's keyword
    # search (which needs a burner IG session — guest mode cannot search). AutoSearch reads
    # only `keywords` from this block.
    discovery:
      keywords:
        - fashion
        - outfit
        - ootd
        - style
        - styling
        - streetwear
        - fashion blogger
        - lookbook
        - wardrobe
        - thrift haul
        - grwm
        - fashion designer
        - fit check
        - aesthetic outfits
        - capsule wardrobe

    # Virality signal weights (auto-normalized to sum to 1 by the engine). Fashion is
    # reach-led — small accounts breaking out on reach/outlier is the signal we chase.
    weights:
      reach_multiplier: 0.35
      outlier_score: 0.25
      engagement_rate: 0.25
      velocity: 0.15

    # Score → label buckets (0-100 blended virality_score).
    tiers:
      - { label: Viral,         min_score: 85 }
      - { label: High,          min_score: 70 }
      - { label: Above Average, min_score: 50 }
      - { label: Normal,        min_score: 0 }

    # Example handles written into platforms/instagram/pages.txt. These are FAKE
    # placeholders — replace them with real creators before a real run.
    seed_pages:
      - "@example.fashion.brand"
      - "@example.ootd.daily"
      - "@example.streetwear.lab"
      - "@example.style.studio"

  x:
    # Max posts pulled per creator (maps to niche_config "posts_per_creator").
    posts_per_creator: 100

    # X reach is repost/quote-driven and decays fast, so velocity carries more weight.
    weights:
      reach_multiplier: 0.30
      outlier_score: 0.25
      engagement_rate: 0.25
      velocity: 0.20

    tiers:
      - { label: Viral,         min_score: 85 }
      - { label: High,          min_score: 70 }
      - { label: Above Average, min_score: 50 }
      - { label: Normal,        min_score: 0 }

    # X handles: no dots, max 15 chars (platform rule). Obviously-fake placeholders.
    seed_pages:
      - "@ex_fashion_1"
      - "@ex_style_daily"
      - "@ex_street_wear"

  youtube:
    # Max Shorts pulled per creator (maps to niche_config "shorts_per_creator").
    shorts_per_creator: 100

    # Shorts have no share/save signal and views are slow-burn, so reach vs subscribers
    # and outlier vs channel median dominate; velocity is down-weighted.
    weights:
      reach_multiplier: 0.40
      outlier_score: 0.30
      engagement_rate: 0.20
      velocity: 0.10

    tiers:
      - { label: Viral,         min_score: 85 }
      - { label: High,          min_score: 70 }
      - { label: Above Average, min_score: 50 }
      - { label: Normal,        min_score: 0 }

    seed_pages:
      - "@example.fashion.channel"
      - "@example.style.shorts"
      - "@example.lookbook.tv"
