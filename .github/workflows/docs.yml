name: Docs

on:
  push:
    branches: [main]
    paths:
      - "documentation/**"
      - ".github/workflows/docs.yml"
  # Build (never deploy — see the `deploy` job's `if:`) on PRs too, so a broken nav entry or
  # a dead reference fails in review rather than after it has already merged.
  pull_request:
    paths:
      - "documentation/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build MkDocs site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Build through ReelScraper's dev dependency group rather than a bare
      # `pip install mkdocs mkdocs-material`. That group pins the versions (mkdocs>=1.6.1,
      # mkdocs-material>=9.7.7) and is the exact command `./docsite` and `health:114` run, so
      # the site CI publishes cannot drift from the one built locally.
      - name: Build site
        run: uv run --project ReelScraper mkdocs build -f documentation/mkdocs.yml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: documentation/site

  deploy:
    name: Deploy to GitHub Pages
    # Only deploy on push to main, never on PRs or manual dispatch from a fork.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
