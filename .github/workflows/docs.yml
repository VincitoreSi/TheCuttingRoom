name: Docs

on:
  push:
    branches: [main]
    paths:
      - "documentation/**"
      - ".github/workflows/docs.yml"
  # Build (never deploy — see the `deploy` job's `if:`) on PRs too, so a broken nav entry or
  # a dead reference fails in review rather than after it has already merged.
  pull_request:
    paths:
      - "documentation/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Deployments to main serialize against each other (never cancel a deploy that is mid-flight —
# Pages ends up serving a half-uploaded artifact), but a PR's build-only run has no reason to
# queue behind them. Keying on the ref gives every PR its own lane while all pushes to main
# still share one.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build MkDocs site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Build through ReelScraper's dev dependency group rather than a bare
      # `pip install mkdocs mkdocs-material`. That group pins the versions (mkdocs>=1.6.1,
      # mkdocs-material>=9.7.7) and is the exact command `./docsite` and `./health` run, so
      # the site CI publishes cannot drift from the one built locally.
      #
      # --strict because this job DEPLOYS. Without it a dead cross-reference or a nav entry
      # pointing at a renamed file is a WARNING, the build exits 0, and the broken page goes
      # live — the failure is then discovered by a reader rather than by review. `./health`
      # runs the same flag, so a PR cannot be green locally and broken here.
      - name: Build site
        run: uv run --project ReelScraper mkdocs build -f documentation/mkdocs.yml --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: documentation/site

  deploy:
    name: Deploy to GitHub Pages
    # Only deploy on push to main, never on PRs or manual dispatch from a fork.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
