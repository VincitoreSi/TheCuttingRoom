name: CI Dashboard

on:
  push:
    paths:
      - "Dashboard/**"
      - ".github/workflows/ci-dashboard.yml"
  pull_request:
    paths:
      - "Dashboard/**"
      - ".github/workflows/ci-dashboard.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Lint, typecheck, build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Node version
        id: node
        run: |
          if [ -f .nvmrc ]; then
            echo "version=$(cat .nvmrc | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"
          else
            echo "version=20" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node.outputs.version }}
          cache: npm
          cache-dependency-path: Dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Prettier check
        run: npm run format:check
